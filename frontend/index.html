<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STEPSS Codegen Studio</title>
  <link rel="stylesheet" href="css/style.css" />
  <!-- Drawflow (MIT) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/drawflow/dist/drawflow.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/drawflow/dist/drawflow.min.js"></script>
</head>
<body>
  <!-- ── Toolbar ─────────────────────────────────────────────────────── -->
  <header id="toolbar">
    <div class="toolbar-brand">
      <span class="toolbar-logo">⚡</span>
      <span class="toolbar-title">STEPSS Codegen Studio</span>
    </div>
    <div class="toolbar-actions">
      <button id="btn-new"         class="btn">New</button>
      <button id="btn-load-txt"    class="btn">Load DSL</button>
      <button id="btn-load-proj"   class="btn">Load Project</button>
      <button id="btn-save-dsl"    class="btn">Save DSL</button>
      <button id="btn-save-proj"   class="btn">Save Project</button>
      <button id="btn-run-codegen" class="btn btn-primary">▶ Run Codegen</button>
    </div>
    <!-- Hidden file inputs -->
    <input type="file" id="file-txt"  accept=".txt"    style="display:none" />
    <input type="file" id="file-proj" accept=".cgproj" style="display:none" />
  </header>

  <!-- ── Main layout ─────────────────────────────────────────────────── -->
  <div id="app-layout">

    <!-- Left: block palette -->
    <aside id="sidebar">
      <div class="sidebar-header">Blocks</div>
      <input id="block-search" class="form-input" type="search" placeholder="Search blocks…" />
      <div id="block-palette"></div>
    </aside>

    <!-- Centre: canvas -->
    <main id="canvas-area">
      <div id="canvas-header">
        <span id="canvas-model-label">New Model</span>
        <span id="dsl-error-badge" style="display:none" class="badge-error"></span>
      </div>
      <div id="drawflow"></div>
    </main>

    <!-- Right: tabbed forms + DSL preview -->
    <aside id="right-panel">
      <!-- Tab bar -->
      <div class="tabs">
        <button class="tab-btn active" data-tab="model">Model</button>
        <button class="tab-btn"        data-tab="data">Data</button>
        <button class="tab-btn"        data-tab="params">Params</button>
        <button class="tab-btn"        data-tab="states">States</button>
        <button class="tab-btn"        data-tab="props">Block</button>
        <button class="tab-btn"        data-tab="dsl">DSL</button>
      </div>

      <!-- Panes -->
      <div class="tab-pane active" id="tab-model"></div>
      <div class="tab-pane"        id="tab-data"></div>
      <div class="tab-pane"        id="tab-params"></div>
      <div class="tab-pane"        id="tab-states"></div>
      <div class="tab-pane"        id="tab-props">
        <p style="color:var(--text-dim);font-size:12px;padding:8px">
          Click a block on the canvas to edit its properties.
        </p>
      </div>
      <div class="tab-pane"        id="tab-dsl">
        <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 8px 4px">
          <span style="font-size:11px;color:var(--text-dim)">Live DSL preview</span>
        </div>
        <pre id="dsl-editor" class="dsl-pre"></pre>
      </div>
    </aside>

  </div><!-- /app-layout -->

  <!-- App entry point (ES module) -->
  <script type="module" src="js/main.js"></script>
</body>
</html>
