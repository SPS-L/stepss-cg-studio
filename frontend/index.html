<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>CODEGEN Studio — STEPSS</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/drawflow@0.0.59/dist/drawflow.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/drawflow@0.0.59/dist/drawflow.min.js"></script>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<header id="topbar">
  <div id="topbar-left">
    <span id="app-logo">&#9889; CODEGEN Studio</span>
    <span id="model-title" class="muted">Untitled model</span>
  </div>
  <div id="topbar-center">
    <label class="tb-label">Type</label>
    <select id="sel-model-type">
      <option value="exc">EXC</option>
      <option value="tor">TOR</option>
      <option value="inj">INJ</option>
      <option value="twop">TWOP</option>
    </select>
    <label class="tb-label">Name</label>
    <input id="inp-model-name" type="text" placeholder="model_name" maxlength="32" spellcheck="false"/>
  </div>
  <div id="topbar-right">
    <button class="tb-btn" id="btn-new">New</button>
    <button class="tb-btn" id="btn-load-dsl">Load DSL</button>
    <button class="tb-btn" id="btn-load-project">Load Project</button>
    <button class="tb-btn" id="btn-save">Save Project</button>
    <button class="tb-btn" id="btn-export-dsl">Export DSL</button>
    <button class="tb-btn accent" id="btn-codegen">&#9654; Run Codegen</button>
    <input type="file" id="file-input-dsl"     accept=".txt"  style="display:none"/>
    <input type="file" id="file-input-project" accept=".json" style="display:none"/>
  </div>
</header>

<div id="main-layout">
  <aside id="palette-panel">
    <div id="palette-search-wrap">
      <input id="palette-search" type="text" placeholder="Search blocks&hellip;" spellcheck="false"/>
    </div>
    <div id="palette-tree"></div>
  </aside>

  <div id="center-column">
    <div id="canvas-toolbar">
      <button class="icon-btn" id="btn-undo" title="Undo (Ctrl+Z)">&#8617;</button>
      <button class="icon-btn" id="btn-redo" title="Redo (Ctrl+Y)">&#8618;</button>
      <button class="icon-btn" id="btn-del"  title="Delete selected (Del)">&#128465;</button>
      <span class="sep"></span>
      <button class="icon-btn" id="btn-fit"  title="Fit to view">&#8861;</button>
      <span class="sep"></span>
      <span id="canvas-status" class="muted"></span>
    </div>
    <div id="drawflow-wrap">
      <div id="drawflow"></div>
    </div>
    <div id="meta-panel">
      <div id="meta-tabs">
        <button class="meta-tab active" data-tab="data">%data</button>
        <button class="meta-tab" data-tab="parameters">%parameters</button>
        <button class="meta-tab" data-tab="states">%states</button>
        <button class="meta-tab" data-tab="observables">%observables</button>
      </div>
      <div id="meta-content">
        <div id="tab-data"        class="tab-pane active"></div>
        <div id="tab-parameters"  class="tab-pane"></div>
        <div id="tab-states"      class="tab-pane"></div>
        <div id="tab-observables" class="tab-pane"></div>
      </div>
    </div>
  </div>

  <aside id="right-panel">
    <div id="inspector-wrap">
      <div id="inspector-title">Select a block to inspect</div>
      <div id="inspector-form"></div>
    </div>
    <div id="dsl-preview-wrap">
      <div id="dsl-preview-header">
        <span>DSL Preview</span>
        <button class="icon-btn" id="btn-copy-dsl" title="Copy to clipboard">&#8856;</button>
      </div>
      <pre id="dsl-preview-content"></pre>
    </div>
  </aside>
</div>

<div id="modal-overlay" class="hidden">
  <div id="modal-box">
    <div id="modal-title"></div>
    <div id="modal-body"></div>
    <div id="modal-footer">
      <button id="modal-ok"     class="tb-btn accent">OK</button>
      <button id="modal-cancel" class="tb-btn">Cancel</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script src="/js/store.js"></script>
<script src="/js/api.js"></script>
<script src="/js/palette.js"></script>
<script src="/js/forms.js"></script>
<script src="/js/canvas.js"></script>
<script src="/js/dsl_preview.js"></script>
<script src="/js/main.js"></script>
</body>
</html>
